version: '3.8'

services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    container_name: meu-mysql
    restart: unless-stopped
    environment:
      # Valores por defeito se faltar ficheiro .env na raiz (evita MySQL com senha vazia)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      # Nome real da base — obrigatório no .env na raiz (sem valor por defeito)
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Defina MYSQL_DATABASE no .env na raiz com o nome correto da base.}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    # Evita o backend ligar antes do MySQL aceitar conexões (corrige ECONNREFUSED)
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-root123}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Backend Node.js
  backend:
    build: ./faturacao-saviltech-backend
    container_name: meu-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      DB_NAME: ${MYSQL_DATABASE:?Defina MYSQL_DATABASE no .env na raiz com o nome correto da base.}
      APP_PORT: 3000
      # Se o browser chamar a API na porta 3000 (sem proxy), tem de listar o origin do site aqui.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

  # Frontend React
  frontend:
    build: ./faturacao-saviltech-frontend
    container_name: meu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
